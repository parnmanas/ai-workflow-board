# CI — Postgres dialect matrix (ticket 0c175408)
#
# Why this exists: dev runs on sql.js (dynamically typed) and prod runs on
# Postgres (strictly typed). Dialect-specific bugs — e.g. the
# `operator does not exist: uuid = character varying` crash in
# chat-rooms searchMessages (ticket ca31a6ea) — pass every local sqlite run and
# only surface AFTER deploy on live Postgres. That made live-only verification a
# recurring structural pattern.
#
# This workflow runs the cross-table / chat-join contract flows against a real
# ephemeral Postgres so that class of bug fails the build BEFORE merge. The
# qa-flows harness (bootApp) already honors DB_TYPE=postgres and, for the
# matrix, isolates each test process in its own pg schema.
#
# The grep guard job is the cheap static backstop (no Postgres needed): it fails
# fast if a chat-rooms query reintroduces a bare `*.room_id = *.room_id`
# column-vs-column join without the ::text cast.

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # Fast static guard — runs everywhere, no DB. Catches the bare-join regression
  # class deterministically in seconds.
  chat-join-grep-guard:
    name: chat-rooms join cast guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run chat-rooms join cast guard
        working-directory: apps/server
        run: node --test --test-force-exit test/chat-room-join-cast-guard.test.mjs

  # (ticket 433f6cbd) 예전엔 여기 `agent-manager version bump guard` 잡이 있어
  # agent-manager 소스가 바뀐 push/PR 은 package.json version 을 손으로 올리도록
  # 강제하고, 리베이스가 그 범프를 조용히 collapse 시킨 경우(board lesson #1)를
  # 사후 검출했다. 이제 버전을 **publish 시점에 레지스트리+patch 로 자동 계산**하므로
  # (publish-agent-manager.yml + scripts/compute-publish-version.mjs) 손으로 범프할
  # 값 자체가 없다 → collapse 될 것도 없어 이 가드는 목적을 잃었다(오히려 정상
  # 변경마다 CI 를 red 로 만든다). 그래서 잡·check-version-bump.mjs·그 테스트를 제거.

  # agent-manager 테스트 게이트 (ticket e09fa003 — e299c6b3 리뷰 후속).
  #
  # 배경: e299c6b3 전까지 agent-manager 의 node --test 스위트(rebase 시점 535 tests —
  # cli-resolver Windows shim, spawn-failure-tracker, subagent-manager 서킷브레이커/silent-exit 등
  # 이 보드의 반복 버그원 회귀 가드 포함)는 어느 CI 잡에도 안 걸려 있었다. blocker
  # 대응으로 추가된 잡은 spawn-cmd 1개 파일만 돌려 "N tests green" 이 assignee 로컬
  # 실행에만 의존했다(리뷰어는 gh 도 없어 교차검증 불가). 이 잡이 전체 스위트를
  # ubuntu + windows-latest 양 축의 CI 게이트로 편입한다.
  #
  # 양 축 모두 build + 전체 스위트(node --test 'test/*.test.mjs')를 돌린다. 대부분
  # 테스트가 dist/ 를 import 하므로 build step 이 선행돼야 한다(tsc·copyFileSync 모두
  # cross-platform). ubuntu 로컬 검증(origin/main@c52e20b 위 rebase 후): 534 pass /
  # 1 skip / 0 fail, ~13s. (skip = spawn-cmd 의 windows-전용 테스트, Linux self-skip)
  #
  # Windows 이식성: 스위트는 대부분 platform·fs 를 '주입'하는 순수 로직이라 win32 에서
  # 그대로 돈다(cli-resolver `.cmd` shim, service-install 런처 XML, process-tree
  # parseProcListWin 등 — 각 테스트 주석 "실제 Windows 호스트 없이 테스트 가능"). 실제
  # `.cmd` CreateProcess 경로(spawn-cmd)와 codex 심링크(자기-skip)는 win32 축에서 처음
  # 진짜 실행된다(위 e299c6b3 codex `.cmd` ENOENT 회귀 — 주입으로 대체 불가). 실 git
  # 서브프로세스로 POSIX 파일권한(mode & 0o077)·절대경로·credential --file= 경로를
  # 단언하는 3개 테스트만 win32 에서 명시적 skip(repo-credential·run-provisioner·
  # worktree-manager 각 1개; 각 `{ skip: process.platform === 'win32' && '…' }` 주석
  # 참조). git config 격리는 os.devNull 로 이식성 있게 고쳤다(git-mode-update).
  #
  # 참고: `node --test test/`(디렉터리 인자)는 node ≥22 에서 `test` 를 엔트리 모듈로
  # 취급해 MODULE_NOT_FOUND 로 죽는다. 그래서 package.json `test` 스크립트와 동일한
  # glob 형(`'test/*.test.mjs'`)을 쓴다 — node 자체가 확장하므로 shell 무관(Windows
  # PowerShell 에선 작은따옴표 리터럴로 node 에 전달돼 node 가 확장한다).
  agent-manager-tests:
    name: agent-manager tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      # 전체 스위트가 dist/ 를 import → build 선행 필수 (양 축 공통).
      - name: Build agent-manager (suite imports dist/)
        working-directory: apps/agent-manager
        run: npm run build
      - name: Run full agent-manager test suite
        working-directory: apps/agent-manager
        run: node --test --test-force-exit 'test/*.test.mjs'

  # 클라이언트 단위·상호작용 테스트 (티켓 98d0936e · F2-1). Phase 1 은 브라우저
  # 러너 부재로 카드 클릭·`?ticket=` 딥링크·모바일 패널·포커스트랩이 SSR/순수
  # 계약으로만 커버됐다. 이제 jsdom 하네스(node --import tsx --test)가 실제
  # react-dom/client 마운트로 그 상호작용을 검증하므로 이 잡이 그 스위트를 CI 에서
  # 태운다 — 신규 프레임워크 없이 기존 러너 관례 그대로.
  client-tests:
    name: client unit + interaction tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run client tests
        run: npm test -w client

  # Dialect matrix — the actual pre-deploy safety net. Boots the contract flows
  # against Postgres 16 (matching the prod image) so uuid/varchar mismatches and
  # other Postgres-only failures are caught here, not on the live server.
  postgres-dialect-matrix:
    name: qa-flows on Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: awb
          POSTGRES_PASSWORD: awb
          POSTGRES_DB: awb_ci
        ports:
          - 5432:5432
        # Wait until pg accepts connections before the job's steps run.
        options: >-
          --health-cmd "pg_isready -U awb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_TYPE: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: awb
      DB_PASS: awb
      DB_NAME: awb_ci
      NODE_ENV: test
      MCP_DEV_MODE: 'true'
      AGENT_DEV_MODE: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build server
        run: npm run build -w server
      - name: Run qa-flows dialect matrix on Postgres
        working-directory: apps/server
        run: npm run test:qa:pg
