# CI — Postgres dialect matrix (ticket 0c175408)
#
# Why this exists: dev runs on sql.js (dynamically typed) and prod runs on
# Postgres (strictly typed). Dialect-specific bugs — e.g. the
# `operator does not exist: uuid = character varying` crash in
# chat-rooms searchMessages (ticket ca31a6ea) — pass every local sqlite run and
# only surface AFTER deploy on live Postgres. That made live-only verification a
# recurring structural pattern.
#
# This workflow runs the cross-table / chat-join contract flows against a real
# ephemeral Postgres so that class of bug fails the build BEFORE merge. The
# qa-flows harness (bootApp) already honors DB_TYPE=postgres and, for the
# matrix, isolates each test process in its own pg schema.
#
# The grep guard job is the cheap static backstop (no Postgres needed): it fails
# fast if a chat-rooms query reintroduces a bare `*.room_id = *.room_id`
# column-vs-column join without the ::text cast.

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # Fast static guard — runs everywhere, no DB. Catches the bare-join regression
  # class deterministically in seconds.
  chat-join-grep-guard:
    name: chat-rooms join cast guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run chat-rooms join cast guard
        working-directory: apps/server
        run: node --test --test-force-exit test/chat-room-join-cast-guard.test.mjs

  # Version-collapse guard (ticket c17a8a40). agent-manager 소스(apps/agent-manager/
  # src/**)가 바뀐 push/PR 은 apps/agent-manager/package.json version 이 반드시
  # 올라가야 한다. 동시 진행 티켓이 같은 버전으로 범프한 뒤 리베이스하면 git 이 그
  # 범프를 충돌 없이 조용히 collapse 시켜(board lesson #1) 빌드가 앞 빌드와
  # version-identical 이 되고, publish-agent-manager.yml 이 "이미 npm 에 있음" 으로
  # no-op 하여 코드 변경이 npm 에 안 실린다. tsc·테스트로 안 잡히는 침묵형 실패라,
  # 그동안 수동 preflight 눈대중에만 의존하던 것을 여기서 결정적으로 막는다.
  agent-manager-version-guard:
    name: agent-manager version bump guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # before..after diff 와 양쪽 ref 의 package.json 을 읽어야 하므로 전체 히스토리.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Resolve compare range
        id: range
        run: |
          # push→main: 직전 tip(before) vs 새 tip(after). PR: base 브랜치 vs head sha.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --quiet origin "${{ github.base_ref }}"
            echo "before=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
            echo "after=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "before=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "after=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Check agent-manager version bump
        run: node apps/agent-manager/scripts/check-version-bump.mjs "${{ steps.range.outputs.before }}" "${{ steps.range.outputs.after }}"

  # Dialect matrix — the actual pre-deploy safety net. Boots the contract flows
  # against Postgres 16 (matching the prod image) so uuid/varchar mismatches and
  # other Postgres-only failures are caught here, not on the live server.
  postgres-dialect-matrix:
    name: qa-flows on Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: awb
          POSTGRES_PASSWORD: awb
          POSTGRES_DB: awb_ci
        ports:
          - 5432:5432
        # Wait until pg accepts connections before the job's steps run.
        options: >-
          --health-cmd "pg_isready -U awb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_TYPE: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: awb
      DB_PASS: awb
      DB_NAME: awb_ci
      NODE_ENV: test
      MCP_DEV_MODE: 'true'
      AGENT_DEV_MODE: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build server
        run: npm run build -w server
      - name: Run qa-flows dialect matrix on Postgres
        working-directory: apps/server
        run: npm run test:qa:pg
