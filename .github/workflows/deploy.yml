name: Deploy AI Workflow Board

on:
  push:
    branches:
      - production.private
  workflow_dispatch:

env:
  DOCKER_IMAGE: ai-workflow-board
  DOCKER_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          # key 가 설정돼 있으면 key 인증 사용, 비어있으면 password 로 fallback.
          # 전환 전략: (1) NAS 에 public key 등록 + NAS_SSH_KEY secret 추가
          #            (2) 배포 1회 → key 인증 성공 확인
          #            (3) NAS_PASSWORD secret 제거 + NAS sshd 에서
          #                PasswordAuthentication no 로 완전 차단
          key: ${{ secrets.NAS_SSH_KEY }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: ${{ secrets.NAS_PORT }}
          script: |
            # Synology NAS PATH 설정
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"

            # ── Docker 네트워크 (앱 ↔ DB 통신용) ──
            docker network create awb-net 2>/dev/null || true

            # ── Env 파일 준비 ──
            # credential 을 docker run 명령줄에 직접 붙이지 않고 파일로 주입.
            # 목적: NAS shell history / ps -ef / SSH 명령줄 로그에 평문 credential
            # 이 찍히는 걸 차단. (docker inspect 의 Env 필드에는 여전히 평문으로
            # 남으므로, 완전 은폐를 원하면 Docker secrets 또는 앱 코드에서
            # file-based credential 로드를 도입해야 함.)
            ENV_DIR=/volume1/docker/awb
            mkdir -p "$ENV_DIR"
            umask 077

            APP_ENV_FILE="$ENV_DIR/app.env"
            cat > "$APP_ENV_FILE" <<EOF
            NODE_ENV=production
            DB_TYPE=postgres
            DB_HOST=awb-postgres
            DB_PORT=5432
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            MCP_API_KEYS=${{ secrets.MCP_API_KEYS }}
            AGENT_API_KEY=${{ secrets.AGENT_API_KEY }}
            # Node runtime tuning for the long-running NAS server. Default V8
            # heap_size_limit is ~4 GB; on 2026-05-28 we observed a leak rate
            # of ~170 MB/min, so the server crashed with "Reached heap limit"
            # within ~25 min of every restart. Doubling to 8 GB buys roughly
            # 2x that window. The two snapshot flags below mean V8 itself
            # writes the first 2 heap snapshots automatically when it senses
            # an imminent OOM — without them the crash leaves no forensic
            # trail. --diagnostic-dir points at /app/data which is the
            # awb-data docker volume below, so the snapshot file survives
            # the inevitable container restart.
            NODE_OPTIONS=--max-old-space-size=8192 --heapsnapshot-near-heap-limit=2 --diagnostic-dir=/app/data
            EOF
            chmod 600 "$APP_ENV_FILE"

            PG_ENV_FILE="$ENV_DIR/postgres.env"
            cat > "$PG_ENV_FILE" <<EOF
            POSTGRES_DB=${{ secrets.DB_NAME }}
            POSTGRES_USER=${{ secrets.DB_USER }}
            POSTGRES_PASSWORD=${{ secrets.DB_PASS }}
            EOF
            chmod 600 "$PG_ENV_FILE"

            # ── PostgreSQL 컨테이너 (최초 1회만 생성, 이후 유지) ──
            if ! docker ps --format '{{.Names}}' | grep -q '^awb-postgres$'; then
              echo "Starting PostgreSQL container..."
              docker run -d \
                --name awb-postgres \
                --network awb-net \
                --restart unless-stopped \
                -v awb-pgdata:/var/lib/postgresql/data \
                --env-file "$PG_ENV_FILE" \
                postgres:16-alpine

              # DB 준비 대기
              echo "Waiting for PostgreSQL to be ready..."
              for i in $(seq 1 30); do
                docker exec awb-postgres pg_isready -U "${{ secrets.DB_USER }}" 2>/dev/null && break
                sleep 1
              done
            else
              # 이미 실행 중이면 네트워크 연결만 확인
              docker network connect awb-net awb-postgres 2>/dev/null || true
              echo "PostgreSQL already running"
            fi

            # GHCR 로그인
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 최신 이미지 pull
            docker pull ghcr.io/${{ github.repository_owner }}/ai-workflow-board:latest

            # 기존 앱 컨테이너 정지 및 제거
            docker stop ai-workflow-board || true
            docker rm ai-workflow-board || true

            # 새 앱 컨테이너 실행 (같은 네트워크에서 DB에 연결)
            #
            # awb-data 볼륨: 컨테이너의 /app/data (Dockerfile 의 AWB_DATA_DIR)
            # 에 마운트 — Credentials 모듈이 ENCRYPTION_KEY env 가 없을 때
            # auto-generate 하는 .encryption_key 파일을 보존한다. 이 마운트
            # 없으면 매 deploy 마다 (docker stop → rm → run 사이클) 키가 새로
            # 생성돼서 이전에 저장된 모든 Credential.encrypted_data 가 복호
            # 불가능해진다 (Postgres row 는 그대로지만 plaintext 복원 불가).
            # 영구 해결책으론 GitHub secrets 에 ENCRYPTION_KEY 를 두고
            # APP_ENV_FILE 에 추가하는 게 더 안전 (volume 유실에도 살아남음).
            docker run -d \
              --name ai-workflow-board \
              --network awb-net \
              --restart unless-stopped \
              -p 7701:7701 \
              --env-file "$APP_ENV_FILE" \
              -v awb-data:/app/data \
              ghcr.io/${{ github.repository_owner }}/ai-workflow-board:latest

            # ── Health check ──
            # 새 컨테이너가 크래시 루프·DB 연결 실패·마이그레이션 오류 등으로
            # 죽어도 docker run 자체는 성공이라 workflow 가 ✅ 로 끝나는 문제.
            # /api/health 에 최대 10분간 2초 간격 재시도; 끝까지 실패하면 컨테이너
            # 로그 덤프 후 exit 1 로 workflow 를 빨갛게 만듦.
            #
            # 왜 10분인가 — pre-sync-postgres 가 60+ FK 컬럼에 대해
            # `ALTER COLUMN TYPE uuid USING col::uuid` 를 돌리는데, 각 ALTER 는
            # 테이블 전체 rewrite + ACCESS EXCLUSIVE 락이라 운영 데이터에선
            # 컬럼당 수십초씩 걸릴 수 있음. 첫 deploy 때 한번만 큰 비용을 내고
            # 이후엔 (currentType === 'uuid') 단축평가로 즉시 끝남.
            # pre-sync 가 살아있는지는 진행 로그(`[pre-sync-postgres] ALTER …`)
            # 가 매 컬럼마다 찍히므로 hang 인지 진짜 작업 중인지 구분 가능.
            echo "Waiting for /api/health to return ok..."
            HEALTH_OK=0
            for i in $(seq 1 300); do
              status=$(docker exec ai-workflow-board wget -qO- http://127.0.0.1:7701/api/health 2>/dev/null | grep -o '"status":"[^"]*"' || true)
              if [ "$status" = '"status":"ok"' ]; then
                HEALTH_OK=1
                echo "Health check OK after ${i} attempt(s) (~$((i*2))s)"
                break
              fi
              # 30초마다 진행 상황 로그 (pre-sync 중인지 확인용)
              if [ $((i % 15)) -eq 0 ]; then
                echo "  …still waiting (~$((i*2))s elapsed); last container log line:"
                docker logs --tail 1 ai-workflow-board 2>&1 | sed 's/^/    /' || true
              fi
              sleep 2
            done
            if [ "$HEALTH_OK" != "1" ]; then
              echo "=== HEALTH CHECK FAILED after 600s — dumping container logs ==="
              docker logs --tail 200 ai-workflow-board || true
              echo "=== container state ==="
              docker inspect --format '{{.State.Status}} exit={{.State.ExitCode}} err={{.State.Error}}' ai-workflow-board || true
              exit 1
            fi

            # 사용하지 않는 이미지 정리
            docker image prune -f
