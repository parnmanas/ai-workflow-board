name: Deploy AI Workflow Board

on:
  push:
    branches:
      - production
  workflow_dispatch:

env:
  DOCKER_IMAGE: ai-workflow-board
  DOCKER_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: ${{ secrets.NAS_PORT }}
          script: |
            # Synology NAS PATH 설정
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"

            # ── Docker 네트워크 (앱 ↔ DB 통신용) ──
            docker network create awb-net 2>/dev/null || true

            # ── Env 파일 준비 ──
            # credential 을 docker run 명령줄에 직접 붙이지 않고 파일로 주입.
            # 목적: NAS shell history / ps -ef / SSH 명령줄 로그에 평문 credential
            # 이 찍히는 걸 차단. (docker inspect 의 Env 필드에는 여전히 평문으로
            # 남으므로, 완전 은폐를 원하면 Docker secrets 또는 앱 코드에서
            # file-based credential 로드를 도입해야 함.)
            ENV_DIR=/volume1/docker/awb
            mkdir -p "$ENV_DIR"
            umask 077

            APP_ENV_FILE="$ENV_DIR/app.env"
            cat > "$APP_ENV_FILE" <<EOF
            NODE_ENV=production
            DB_TYPE=postgres
            DB_HOST=awb-postgres
            DB_PORT=5432
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            MCP_API_KEYS=${{ secrets.MCP_API_KEYS }}
            AGENT_API_KEY=${{ secrets.AGENT_API_KEY }}
            EOF
            chmod 600 "$APP_ENV_FILE"

            PG_ENV_FILE="$ENV_DIR/postgres.env"
            cat > "$PG_ENV_FILE" <<EOF
            POSTGRES_DB=${{ secrets.DB_NAME }}
            POSTGRES_USER=${{ secrets.DB_USER }}
            POSTGRES_PASSWORD=${{ secrets.DB_PASS }}
            EOF
            chmod 600 "$PG_ENV_FILE"

            # ── PostgreSQL 컨테이너 (최초 1회만 생성, 이후 유지) ──
            if ! docker ps --format '{{.Names}}' | grep -q '^awb-postgres$'; then
              echo "Starting PostgreSQL container..."
              docker run -d \
                --name awb-postgres \
                --network awb-net \
                --restart unless-stopped \
                -v awb-pgdata:/var/lib/postgresql/data \
                --env-file "$PG_ENV_FILE" \
                postgres:16-alpine

              # DB 준비 대기
              echo "Waiting for PostgreSQL to be ready..."
              for i in $(seq 1 30); do
                docker exec awb-postgres pg_isready -U "${{ secrets.DB_USER }}" 2>/dev/null && break
                sleep 1
              done
            else
              # 이미 실행 중이면 네트워크 연결만 확인
              docker network connect awb-net awb-postgres 2>/dev/null || true
              echo "PostgreSQL already running"
            fi

            # GHCR 로그인
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 최신 이미지 pull
            docker pull ghcr.io/${{ github.repository_owner }}/ai-workflow-board:latest

            # 기존 앱 컨테이너 정지 및 제거
            docker stop ai-workflow-board || true
            docker rm ai-workflow-board || true

            # 새 앱 컨테이너 실행 (같은 네트워크에서 DB에 연결)
            docker run -d \
              --name ai-workflow-board \
              --network awb-net \
              --restart unless-stopped \
              -p 7701:7701 \
              --env-file "$APP_ENV_FILE" \
              ghcr.io/${{ github.repository_owner }}/ai-workflow-board:latest

            # 사용하지 않는 이미지 정리
            docker image prune -f
