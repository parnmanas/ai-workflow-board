version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_workflow}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:?Set DB_PASS in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: ghcr.io/parnmanas/ai-workflow-board:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '7701:7701'
    environment:
      NODE_ENV: production
      PORT: 7701
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ai_workflow}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS}
      # Required to use the Credentials feature in production. Without it the
      # server tries to write a key file to /app/database, which the container
      # user can't create — credential save fails with EACCES. Generate once
      # and keep stable across deploys: openssl rand -hex 32
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}

volumes:
  pgdata:
